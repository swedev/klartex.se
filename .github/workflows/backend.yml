name: Build and publish backend image

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (e.g. 0.1.0). Defaults to short SHA.'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: meta
        run: |
          ver=$(python3 -c "import tomllib,sys; print(tomllib.load(open('backend/pyproject.toml','rb'))['project']['version'])")
          input_ver="${{ github.event.inputs.version }}"
          if [[ -n "$input_ver" ]]; then ver="$input_ver"; fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: tags
        with:
          images: ghcr.io/swedev/klartex-se-backend
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=${{ steps.meta.outputs.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      # 1. Build amd64 first and LOAD into the runner — so we can actually
      #    run it and smoke-test before pushing. arm64 push happens only
      #    after smoke-test passes. This catches runtime failures (missing
      #    LaTeX packages, PATH issues, etc) that "docker build success"
      #    alone does not detect.
      - uses: docker/build-push-action@v6
        id: build_amd64
        with:
          context: ./backend
          platforms: linux/amd64
          load: true
          tags: smoke-test:amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test (render a minimal block-engine PDF)
        run: |
          docker run -d --name smoke -p 18000:8000 smoke-test:amd64
          # wait for /health to respond
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18000/health >/dev/null 2>&1; then
              echo "✓ /health up after ${i}s"; break
            fi
            sleep 1
          done
          curl -fsS http://localhost:18000/health
          # actual render — this is what catches missing tex packages
          status=$(curl -s -o /tmp/out.pdf -w '%{http_code}' \
            -X POST http://localhost:18000/render \
            -H "Content-Type: application/json" \
            -d '{"template":"_block","data":{"lang":"sv","body":[{"type":"heading","text":"CI smoke"},{"type":"text","text":"verifies xelatex + all sty files load"}]}}')
          echo "render HTTP $status"
          if [ "$status" != "200" ]; then
            echo "--- backend logs ---"
            docker logs smoke
            echo "--- response ---"
            cat /tmp/out.pdf
            exit 1
          fi
          head -c 4 /tmp/out.pdf | grep -q '%PDF' || {
            echo "Response is not a PDF"; head -c 200 /tmp/out.pdf; exit 1;
          }
          echo "✓ render produced $(stat -c%s /tmp/out.pdf) bytes of PDF"
          docker stop smoke

      # 2. After smoke-test passes, build multi-arch and push to GHCR.
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
